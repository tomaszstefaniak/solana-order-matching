name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Rust fmt + check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      # cargo check verifies the program compiles without Anchor/Solana toolchain.
      # Full anchor build (requires Solana BPF toolchain) runs in the build job.
      # Clippy is skipped: Anchor macros emit unexpected_cfgs that cause false
      # positives under standard rustc — this is a known upstream limitation.
      - name: Cargo check
        run: cargo check --all-targets

  build:
    name: Anchor build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-anchor-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Verify anchor in PATH
        run: |
          export PATH="$HOME/.cargo/bin:$HOME/.local/share/solana/install/active_release/bin:$PATH"
          which anchor && anchor --version

      - name: Build program
        run: |
          export PATH="$HOME/.cargo/bin:$HOME/.local/share/solana/install/active_release/bin:$PATH"
          anchor build

      - name: Upload IDL artifact
        uses: actions/upload-artifact@v4
        with:
          name: idl
          path: target/idl/order_matching.json
          if-no-files-found: warn
