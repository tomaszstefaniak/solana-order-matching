name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Anchor programs require the Solana BPF toolchain to build (anchor-cli v0.30.1
# depends on time-0.3.29 which has a type-inference regression on Rust >=1.82).
# Full `anchor build` is therefore run locally — see README Setup section.
# This CI job verifies code style and that the program type-checks on stable Rust.

jobs:
  lint:
    name: Rust fmt + check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      # cargo check compiles the program without the Solana BPF target.
      # Note: Anchor macros emit unexpected_cfgs (custom-heap, anchor-debug)
      # under standard rustc — these are known false positives suppressed below.
      - name: Cargo check
        run: cargo check --all-targets
