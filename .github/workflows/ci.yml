name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Rust fmt + check + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --all-targets

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: |
          cargo audit -q || echo "cargo-audit returned non-zero exit (vulns may exist); review output above"

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm deps
        run: |
          cd app && npm ci
          npm ci

      - name: Run npm audit (low severity allowed)
        run: |
          npm audit --json > audit.json || true
          cat audit.json | jq '.metadata.vulnerabilities'

      - name: Type-check TS
        run: npx tsc --noEmit

# Note: anchor build is intentionally omitted from CI due to anchor-cli compilation fragility
# on some runners. Build and deploy locally before submission.
